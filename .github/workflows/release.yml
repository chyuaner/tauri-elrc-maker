name: Build & Release

# ────────────────────────────────────────────────────────────────────────────
# 觸發條件
#   ① push 到 master/main → 建置並上傳 Artifacts（不建立 Release）
#   ② push v* tag         → 建置 + 建立 GitHub Draft Release
#   ③ 手動觸發            → 可選擇是否建立 Release
# ────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: '是否建立 GitHub Release（勾選後會產生 Draft Release）'
        type: boolean
        required: false
        default: false

permissions:
  contents: write  # 建立 GitHub Release 及上傳 artifacts 所需

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build [${{ matrix.os_name }}]
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows：NSIS 免安裝 exe + zip portable ─────────────────────────
          - platform: windows-latest
            os_name: Windows
            bundles: nsis

          # ── macOS：Universal Binary DMG ──────────────────────────────────────
          - platform: macos-latest
            os_name: macOS
            bundles: dmg
            rust_targets: 'aarch64-apple-darwin x86_64-apple-darwin'
            args: '--target universal-apple-darwin'

          # ── Linux：AppImage + deb + raw binary ───────────────────────────────
          - platform: ubuntu-22.04
            os_name: Linux
            bundles: appimage,deb
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      # ────────────────────────────────────────────────────────────────────────
      # 1. Checkout（含 submodule）
      # ────────────────────────────────────────────────────────────────────────
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      # ────────────────────────────────────────────────────────────────────────
      # 2. Linux 系統依賴
      #    ★ 加入完整 GStreamer 套件，修正 AppImage 載入音訊後 crash 的問題
      #      linuxdeploy-plugin-gstreamer 打包 AppImage 時需要這些 .so
      # ────────────────────────────────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libglib2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav

      # ────────────────────────────────────────────────────────────────────────
      # 3. macOS：加入 Rust universal binary targets
      # ────────────────────────────────────────────────────────────────────────
      - name: Add macOS Rust targets (universal binary)
        if: matrix.platform == 'macos-latest'
        run: rustup target add ${{ matrix.rust_targets }}

      # ────────────────────────────────────────────────────────────────────────
      # 4. 設定 Rust（含快取）
      # ────────────────────────────────────────────────────────────────────────
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust / Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ────────────────────────────────────────────────────────────────────────
      # 5. 設定 Node.js
      # ────────────────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ────────────────────────────────────────────────────────────────────────
      # 6. 安裝前端依賴（根目錄 + submodule）
      # ────────────────────────────────────────────────────────────────────────
      - name: Install root npm dependencies
        run: npm ci

      - name: Install submodule (aistudio-elrc-maker) npm dependencies
        run: npm ci
        working-directory: aistudio-elrc-maker

      # ────────────────────────────────────────────────────────────────────────
      # 7. 判斷版本號與是否建立 Release
      # ────────────────────────────────────────────────────────────────────────
      - name: Determine version and release mode
        id: ctx
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # tag push → 正式 Release
            VERSION="${GITHUB_REF#refs/tags/}"
            IS_RELEASE="true"
          elif [[ "${{ github.event.inputs.create_release }}" == "true" ]]; then
            # 手動觸發且勾選 create_release
            VERSION="dev-$(git rev-parse --short HEAD)"
            IS_RELEASE="true"
          else
            # 一般 branch push → 僅上傳 Artifacts
            VERSION="dev-$(git rev-parse --short HEAD)"
            IS_RELEASE="false"
          fi
          echo "version=${VERSION}"      >> "$GITHUB_OUTPUT"
          echo "is_release=${IS_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "▶ Version=${VERSION}, Release=${IS_RELEASE}"

      # ────────────────────────────────────────────────────────────────────────
      # 8. Tauri Build
      #    ★ Windows → NSIS（per-user，免管理員），不再建置 MSI
      #    ★ Linux   → AppImage + deb，並設 WEBKIT_DISABLE_COMPOSITING_MODE=1
      #               修正 WebKitGTK 在某些 GPU 環境的渲染崩潰
      # ────────────────────────────────────────────────────────────────────────
      - name: Build Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Linux 特用：避免 AppImage 需要 FUSE ──
          APPIMAGE_EXTRACT_AND_RUN: '1'
          NO_STRIP: 'true'
          # ── Linux 特用：停用 GPU compositing，防止 WebKit 在無顯示伺服器環境 crash ──
          WEBKIT_DISABLE_COMPOSITING_MODE: '1'
          # ── macOS 程式碼簽署（選用，設定 Secrets 後取消註解）──
          # APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID:                   ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
        with:
          # tag 觸發或手動指定時才設 tagName，否則不建立 Release
          tagName:     ${{ steps.ctx.outputs.is_release == 'true' && steps.ctx.outputs.version || '' }}
          releaseName: 'LRC Maker Enhanced ${{ steps.ctx.outputs.version }}'
          releaseBody: |
            ## LRC Maker Enhanced ${{ steps.ctx.outputs.version }}

            ### 📥 下載說明
            | 平台 | 檔案 | 說明 |
            |------|------|------|
            | Windows | `*-setup.exe` | NSIS 安裝檔（免管理員，可選擇安裝位置）|
            | Windows | `*-portable.zip` | 解壓即用，免安裝 |
            | macOS | `*.dmg` | Universal Binary（Intel & Apple Silicon）|
            | Linux | `*.AppImage` | 免安裝，`chmod +x` 後直接執行 |
            | Linux | `*.deb` | 適用 Ubuntu / Debian |
            | Linux | `*-linux-x86_64` | 原始執行檔（需系統有 webkit2gtk）|

            ---
            *由 GitHub Actions 自動建置*
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }} --bundles ${{ matrix.bundles }}
          beforeBuildCommand: 'npm run build'

      # ────────────────────────────────────────────────────────────────────────
      # 9-W. Windows：打包 portable zip
      #      Tauri 編譯出的 .exe 內嵌前端靜態檔，WebView2 由 Windows 10/11
      #      系統提供（已預裝），因此單一 exe 可直接執行
      # ────────────────────────────────────────────────────────────────────────
      - name: Package Windows portable zip
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $exe = "src-tauri\target\release\tauri-elrc-maker.exe"
          $zip = "src-tauri\target\release\bundle\nsis\tauri-elrc-maker-${{ steps.ctx.outputs.version }}-portable.zip"
          if (Test-Path $exe) {
            Compress-Archive -Path $exe -DestinationPath $zip -Force
            Write-Output "✅ Portable zip: $zip"
          } else {
            Write-Warning "❌ Executable not found: $exe"
          }

      # ────────────────────────────────────────────────────────────────────────
      # 9-L. Linux：複製 raw binary（依賴系統 webkit2gtk，非完全 portable）
      # ────────────────────────────────────────────────────────────────────────
      - name: Package Linux raw binary
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          BIN_SRC="src-tauri/target/release/tauri-elrc-maker"
          BIN_DST="src-tauri/target/release/bundle/tauri-elrc-maker-${{ steps.ctx.outputs.version }}-linux-x86_64"
          if [ -f "$BIN_SRC" ]; then
            cp "$BIN_SRC" "$BIN_DST"
            chmod +x "$BIN_DST"
            echo "✅ Raw binary: $BIN_DST"
          else
            echo "❌ Binary not found: $BIN_SRC"
          fi

      # ────────────────────────────────────────────────────────────────────────
      # 10. 上傳 Artifacts（所有 push 都會上傳，保留 14 天）
      # ────────────────────────────────────────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-${{ matrix.os_name }}-${{ steps.ctx.outputs.version }}
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.zip
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/*-linux-x86_64
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.dmg
          if-no-files-found: warn
          retention-days: 14
